<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220">
  <defs>
    <!-- ドームのグラデーション（上が明るく下が濃い） -->
    <radialGradient id="domeGrad" cx="50%" cy="30%" r="65%">
      <stop offset="0%"   stop-color="#8DD8ED"/>
      <stop offset="55%"  stop-color="#4BB8D4"/>
      <stop offset="100%" stop-color="#2E9BB8"/>
    </radialGradient>
    <!-- ハイライト -->
    <radialGradient id="highlight" cx="38%" cy="25%" r="30%">
      <stop offset="0%"   stop-color="#C8EEF8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#4BB8D4" stop-opacity="0"/>
    </radialGradient>
    <!-- ハンドルのグラデーション -->
    <linearGradient id="handleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#2E9BB8"/>
      <stop offset="50%"  stop-color="#4BB8D4"/>
      <stop offset="100%" stop-color="#2E9BB8"/>
    </linearGradient>
    <!-- ドロップシャドウ -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4BB8D4" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- ── ドーム本体 ── -->
  <g filter="url(#shadow)">
    <!-- ドーム外形（半円＋底辺のスカラップ） -->
    <path d="
      M 20,105
      Q 20,20 100,15
      Q 180,20 180,105
      Q 158,88 145,105
      Q 130,88 118,105
      Q 105,88 100,105
      Q 95,88 82,105
      Q 70,88 55,105
      Q 42,88 20,105
      Z
    " fill="url(#domeGrad)"/>

    <!-- ハイライト（光沢） -->
    <path d="
      M 20,105
      Q 20,20 100,15
      Q 180,20 180,105
      Q 158,88 145,105
      Q 130,88 118,105
      Q 105,88 100,105
      Q 95,88 82,105
      Q 70,88 55,105
      Q 42,88 20,105
      Z
    " fill="url(#highlight)"/>

    <!-- パネルの縫い目ライン -->
    <g stroke="#3AADC7" stroke-width="0.8" fill="none" opacity="0.6">
      <path d="M 100,15 Q 85,60 82,105"/>
      <path d="M 100,15 Q 115,60 118,105"/>
      <path d="M 100,15 Q 60,50 55,105"/>
      <path d="M 100,15 Q 140,50 145,105"/>
      <path d="M 100,15 Q 32,50 20,105"/>
      <path d="M 100,15 Q 165,50 180,105"/>
    </g>

    <!-- スカラップ先端の丸 -->
    <circle cx="20"  cy="105" r="4" fill="#4BB8D4"/>
    <circle cx="55"  cy="105" r="4" fill="#4BB8D4"/>
    <circle cx="82"  cy="105" r="4" fill="#4BB8D4"/>
    <circle cx="100" cy="105" r="4" fill="#4BB8D4"/>
    <circle cx="118" cy="105" r="4" fill="#4BB8D4"/>
    <circle cx="145" cy="105" r="4" fill="#4BB8D4"/>
    <circle cx="180" cy="105" r="4" fill="#4BB8D4"/>
  </g>

  <!-- ── 柄（シャフト）── -->
  <rect x="98" y="105" width="4" height="85" rx="2" fill="#FFFFFF" opacity="0.9"/>

  <!-- ── 曲がったグリップ ── -->
  <path d="M 100,190 Q 100,215 120,215 Q 140,215 140,200"
        stroke="url(#handleGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- ── 頂点の飾り ── -->
  <circle cx="100" cy="15" r="4.5" fill="#2E9BB8"/>
  <circle cx="100" cy="15" r="2.5" fill="#8DD8ED"/>
</svg>
